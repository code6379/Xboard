services:
  xboard:
    image: ghcr.io/cedar2025/xboard:latest
    restart: unless-stopped
    ports:
      - "7001:7001"
    volumes:
      - ./www:/www
      - ./data/redis:/data
      - ./data/database:/www/.docker/.data
      - ./data/logs:/www/storage/logs
      - ./data/theme:/www/storage/theme
      - ./data/plugins:/www/plugins
    environment:
      - RESOURCE_PROFILE=balanced
      - ENABLE_HORIZON=true
      - docker=true

  tinyrdm:
    image: ghcr.io/tiny-craft/tiny-rdm:latest
    restart: unless-stopped
    ports:
      - "18086:8086"
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=zxc123456
    volumes:
      - ./data/tinyrdm:/app/tinyrdm
      - ./data/redis:/data/redis:ro
    depends_on:
      - xboard
